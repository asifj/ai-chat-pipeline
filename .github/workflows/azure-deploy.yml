name: Deploy to Azure Container Apps (Free Tier)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
      - "requirements.txt"
      - "infrastructure/**"
      - ".github/workflows/azure-deploy.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: asifj/ai-chat-pipeline 
  AZURE_RESOURCE_GROUP: ai-chat-pipeline-rg
  AZURE_LOCATION: eastus

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Azure Login (Client Secret)
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }}

      - name: Deploy Infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infrastructure/main.bicep \
            --parameters \
              containerImage="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
              githubToken="${{ secrets.GITHUB_TOKEN }}" \
              geminiApiKey="${{ secrets.GEMINI_API_KEY }}" \
              dropboxRefreshToken="${{ secrets.DROPBOX_REFRESH_TOKEN }}" \
              dropboxAppKey="${{ secrets.DROPBOX_APP_KEY }}" \
              dropboxAppSecret="${{ secrets.DROPBOX_APP_SECRET }}" \
              sourceRoot="/Apps/obsidian_db_pusher/AI_logs" \
              outputRoot="/Apps/obsidian_db_pusher/Obsidian/AI_Chats"

      - name: Get Job Details
        run: |
          echo "Container App Job deployed successfully!"
          az containerapp job show \
            --name ai-chat-pipeline-job \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "{name:name,provisioningState:properties.provisioningState}" \
            --output table
