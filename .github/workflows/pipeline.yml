name: AI Chat Pipeline

on:
  # Run every 6 hours
  schedule:
    - cron: "0 */6 * * *"

  # Allow manual trigger with optional overrides
  workflow_dispatch:
    inputs:
      force_reprocess:
        description: "Reprocess all files (true/false)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      dry_run:
        description: "Dry run only (true/false)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      max_files:
        description: "Max files to process per run"
        required: false
        default: "50"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          SOURCE_ROOT: ${{ secrets.SOURCE_ROOT || '/AI_logs' }}
          OUTPUT_ROOT: ${{ secrets.OUTPUT_ROOT || '/Obsidian/AI_Chats' }}
          MAX_FILES: ${{ github.event.inputs.max_files || '50' }}
          FORCE_REPROCESS: ${{ github.event.inputs.force_reprocess || 'false' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python src/pipeline.py

  # Optional: build and push Docker image on code changes to main
  build-container:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs: []
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
